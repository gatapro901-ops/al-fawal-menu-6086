
      <!DOCTYPE html>
      <html lang="ar" dir="rtl">
      <head>
         <meta charset="UTF-8">
         <meta name="viewport" content="width=device-width, initial-scale=1.0">
         <title>Al Fawal Menu</title>
         <link rel="stylesheet" href="https://cdn.tailwindcss.com">
         <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap">
         <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
         <link rel="stylesheet" href="styles.css">
      </head>
      <body class="bg-[#020617] text-[#f1f5f9]">
         <header class="bg-[#020617] py-4">
            <nav class="container mx-auto flex justify-between items-center">
               <a href="#" class="text-lg font-bold">Al Fawal</a>
               <button id="menu-btn" class="lg:hidden flex justify-center w-8 h-8 bg-[#6366f1] rounded-full">
                  <lucide-menu class="text-white"></lucide-menu>
               </button>
               <ul id="menu" class="hidden lg:flex items-center space-x-4">
                  <li><a href="#hero" class="hover:text-[#6366f1]">الرئيسية</a></li>
                  <li><a href="#menu-section" class="hover:text-[#6366f1]">القائمة</a></li>
                  <li><a href="#contact" class="hover:text-[#6366f1]">اتصل بنا</a></li>
               </ul>
            </nav>
         </header>
         <main>
            <section id="hero" class="h-screen flex items-center justify-center">
               <div class="container mx-auto flex flex-col items-center space-y-4">
                  <h1 class="text-5xl font-bold animate-bounce">Al Fawal</h1>
                  <p class="text-lg">مطعم الفوال</p>
                  <button class="bg-[#6366f1] hover:bg-[#818cf8] text-white font-bold py-2 px-4 rounded">
                     استكشف القائمة
                  </button>
               </div>
            </section>
            <section id="menu-section" class="py-20">
               <div class="container mx-auto">
                  <h2 class="text-3xl font-bold mb-4">القائمة</h2>
                  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                     <div class="card glass-effect">
                        <h3 class="text-lg font-bold mb-2">طاعميه</h3>
                        <p class="text-lg">5﷼</p>
                     </div>
                     <div class="card glass-effect">
                        <h3 class="text-lg font-bold mb-2">فول</h3>
                        <p class="text-lg">2﷼</p>
                     </div>
                  </div>
               </div>
            </section>
            <section id="contact" class="py-20">
               <div class="container mx-auto">
                  <h2 class="text-3xl font-bold mb-4">اتصل بنا</h2>
                  <p class="text-lg">للمزيد من المعلومات يرجى الاتصال بنا</p>
               </div>
            </section>
         </main>
         <footer class="bg-[#020617] py-4">
            <div class="container mx-auto flex justify-center">
               <p class="text-lg">&copy; 2024 Al Fawal. All rights reserved.</p>
            </div>
         </footer>
         <script src="app.js" defer></script>
         <script src="data.js" defer></script>
      </body>
      </html>
